name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  java-build:
    name: Java Maven Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Java modules
        shell: bash
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            mvn -B -ntp -DskipTests package && break
            if [ "$i" -eq 3 ]; then
              echo "Maven build failed after retries"
              exit 1
            fi
            echo "Retrying Maven build ($i/3)..."
            sleep 10
          done

  cpp-build:
    name: MiniSQL C++ Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: minisql/cpp-core

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build MiniSQL main binary
        run: make main
